<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/layout :: html(~{::section}, '관리자')">

<section class="admin-page py-4">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <div class="container admin-shell">

    <div class="admin-hero">
      <div>
        <h1 class="admin-title">관리자 페이지</h1>
        <p class="admin-subtitle mb-0">회원 · 리뷰 · Q&A를 한 곳에서 관리하세요.</p>
      </div>
      <a class="btn btn-light fw-bold" th:href="@{/main}">메인으로</a>
    </div>

    <nav class="admin-nav">
      <a th:href="@{/admin}" class="active">대시보드</a>
      <a th:href="@{/admin/members}">회원관리</a>
      <a th:href="@{/admin/reviews}">리뷰상태관리</a>
      <a th:href="@{/admin/qna}">질문/답변</a>
    </nav>

    <div class="admin-card">
      <div class="row g-3">
        <div class="col-md-4">
          <div class="admin-card">
            <div class="text-muted fw-bold">오늘 가입</div>
            <div style="font-size:2rem;font-weight:900;">0</div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="admin-card">
            <div class="text-muted fw-bold">대기 리뷰</div>
            <div style="font-size:2rem;font-weight:900;">0</div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="admin-card">
            <div class="text-muted fw-bold">미답변 질문</div>
            <div style="font-size:2rem;font-weight:900;">0</div>
          </div>
        </div>
      </div>

      <hr class="my-4">

      <div class="text-muted">
        여기 숫자는 나중에 서비스 붙이면 바로 채워짐. (지금은 UI 골격)
      </div>
    </div>

  </div>

  <script th:src="@{/js/admin.js}"></script>
</section>
</html>
