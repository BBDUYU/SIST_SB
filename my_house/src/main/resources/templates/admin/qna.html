<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/layout :: html(~{::section}, '질문/답변')">

<section class="admin-page py-4">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <div class="container admin-shell">

    <div class="admin-hero">
      <div>
        <h1 class="admin-title">질문 / 답변</h1>
        <p class="admin-subtitle mb-0">미답변 질문을 빠르게 처리합니다.</p>
      </div>
    </div>

    <nav class="admin-nav">
      <a th:href="@{/admin/members}">회원관리</a>
      <a th:href="@{/admin/reviews}">리뷰상태관리</a>
      <a th:href="@{/admin/qna}" class="active">질문/답변</a>
    </nav>

    <div class="admin-card">
      <div class="admin-toolbar">
        <div class="d-flex gap-2 flex-wrap">
          <a class="badge-pill badge-warn" th:href="@{/admin/qna(status='UNANSWERED')}">미답변</a>
          <a class="badge-pill badge-ok" th:href="@{/admin/qna(status='ANSWERED')}">답변완료</a>
          <a class="badge-pill" th:href="@{/admin/qna(status='ALL')}">전체</a>
        </div>

        <div class="admin-search">
          <input class="form-control" data-admin-search
                 placeholder="제목/내용/작성자 검색 (Enter)"
                 th:value="${param.q}">
        </div>
      </div>

      <div class="table-responsive">
        <table class="table admin-table align-middle mb-0">
          <thead>
          <tr>
            <th style="width:12%;">상태</th>
            <th>질문</th>
            <th style="width:14%;">작성자</th>
            <th style="width:14%;">작성일</th>
            <th style="width:18%;">관리</th>
          </tr>
          </thead>

		  <tbody>
		    <tr th:each="q : ${questions}">
		      <td>
		        <span th:if="${q.status.name() == 'WAITING'}" class="badge-pill badge-warn">UNANSWERED</span>
		        <span th:if="${q.status.name() == 'COMPLETED'}" class="badge-pill badge-ok">ANSWERED</span>
		      </td>

		      <td>
		        <div class="fw-bold" th:text="${q.title}">질문 제목</div>
		        <div class="text-muted" 
		             th:text="${q.content}" 
		             style="font-size:.85rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:560px;">
		          질문 상세 내용 일부...
		        </div>
		      </td>

		      <td th:text="${q.user != null ? q.user.nickname : '알 수 없음'}">작성자</td>

		      <td th:text="${#temporals.format(q.createdAt, 'yyyy-MM-dd')}">2026-03-03</td>

		      <td class="admin-actions">
		        <button class="btn btn-outline-primary btn-sm" type="button" 
		                th:onclick="prepareAnswer([[${q.inquiryId}]], [[${q.title}]])">답변하기</button>
		      </td>
		    </tr>
		  </tbody>
        </table>
      </div>

      <!-- 답변 작성 폼(선택: 페이지 하단에 고정 폼) -->
      <hr class="my-4">
      <div class="fw-bold mb-2">답변 작성</div>

      <form>
        <div class="mb-2">
          <textarea class="form-control" rows="4" placeholder="답변 내용을 입력하세요"></textarea>
        </div>
        <button class="btn btn-primary btn-sm" type="button">답변 저장</button>
      </form>

    </div>

  </div>

  <script th:src="@{/js/admin.js}"></script>
</section>
</html>
