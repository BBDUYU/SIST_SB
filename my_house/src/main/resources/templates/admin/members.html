<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/layout :: html(~{::section}, '회원관리')">

<section class="admin-page py-4">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    
    <div class="container admin-shell">
        <div class="admin-hero">
            <div>
                <h1 class="admin-title">회원관리</h1>
                <p class="admin-subtitle mb-0">상태 변경/정지/권한 부여를 관리합니다.</p>
            </div>
        </div>

        <nav class="admin-nav">
            <a th:href="@{/admin/members}">회원관리</a>
            <a th:href="@{/admin/reviews}">리뷰상태관리</a>
            <a th:href="@{/admin/qna}">질문/답변</a>
        </nav>

        <div class="admin-card">
            <div class="admin-toolbar">
                <div class="admin-search">
                    <input class="form-control" data-admin-search
                           th:value="${param.q}"
                           placeholder="닉네임/이메일 검색 (Enter)">
                </div>

                <div class="d-flex gap-2 admin-actions">
                    <button class="btn btn-outline-secondary btn-sm" type="button">CSV 내보내기</button>
                    <button id="btn-register-admin" class="btn btn-primary btn-sm" type="button">새 관리자 등록</button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table admin-table align-middle mb-0">
                    <thead>
                        <tr>
                            <th style="width:14%;">권한</th>
                            <th>닉네임</th>
                            <th>이메일</th>
                            <th style="width:18%;">상태</th>
                            <th style="width:18%;">관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="m : ${members}">
                            <td>
                                <span class="badge-pill" 
                                      th:classappend="${m.role == 'ROLE_ADMIN' ? 'badge-admin' : 'badge-ok'}"
                                      th:text="${m.role}">USER</span>
                            </td>
                            <td th:text="${m.nickname}">닉네임</td>
                            <td th:text="${m.email}">email@example.com</td>
                            <td>
                                <select class="form-select form-select-sm status-select" 
                                        th:onchange="|adminMemberModule.changeStatus(${m.uid}, this.value)|">
                                    <option value="ACTIVE" th:selected="${m.status.name() == 'ACTIVE'}">정상(ACTIVE)</option>
                                    <option value="BANNED" th:selected="${m.status.name() == 'BANNED'}">정지(BANNED)</option>
                                    <option value="DELETED" th:selected="${m.status.name() == 'DELETED'}">탈퇴(DELETED)</option>
                                </select>
                            </td>
                            <td class="admin-actions">
                                <button class="btn btn-outline-primary btn-sm" type="button"
                                        th:data-uid="${m.uid}" 
                                        th:data-current-role="${m.role}"
                                        onclick="adminMemberModule.toggleRole(this)">권한</button>
                                
                                <button class="btn btn-outline-danger btn-sm" type="button"
                                        th:data-uid="${m.uid}" 
                                        th:data-current-status="${m.status}"
                                        th:text="${m.status.name() == 'ACTIVE' ? '정지' : '해제'}"
                                        onclick="adminMemberModule.toggleStatus(this)">정지</button>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(members)}">
                            <td colspan="5" class="text-center py-4 text-muted">등록된 회원이 없습니다.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script th:src="@{/js/adminMember.js}"></script>
</section>
</html>
