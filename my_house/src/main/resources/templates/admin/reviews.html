<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/layout :: html(~{::section}, '리뷰상태관리')">

<section class="admin-page py-4">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <div class="container admin-shell">

    <div class="admin-hero">
      <div>
        <h1 class="admin-title">리뷰상태관리</h1>
        <p class="admin-subtitle mb-0">매물 리뷰를 승인/숨김 처리합니다.</p>
      </div>
    </div>

    <nav class="admin-nav">
      <a th:href="@{/admin/members}">회원관리</a>
      <a th:href="@{/admin/reviews}" class="active">리뷰상태관리</a>
      <a th:href="@{/admin/qna}">질문/답변</a>
    </nav>

    <div class="admin-card">
      <div class="admin-toolbar">
        <div class="d-flex gap-2 flex-wrap">
          <a class="badge-pill badge-ok"
             th:classappend="${status.name() == 'ACTIVE'} ? ' active' : ''"
             th:href="@{/admin/reviews(status='ACTIVE', q=${q})}">승인</a>

          <a class="badge-pill badge-danger"
             th:classappend="${status.name() == 'INACTIVE'} ? ' active' : ''"
             th:href="@{/admin/reviews(status='INACTIVE', q=${q})}">숨김</a>
        </div>

        <div class="admin-search">
          <input class="form-control" data-admin-search
                 placeholder="매물명/리뷰내용/작성자 검색 (Enter)"
                 th:value="${q}">
        </div>
      </div>

      <div class="table-responsive">
        <table class="table admin-table align-middle mb-0">
          <thead>
          <tr>
            <th style="width:12%;">상태</th>
            <th>매물</th>
            <th>리뷰</th>
            <th style="width:14%;">작성자</th>
            <th style="width:14%;">작성일</th>
            <th style="width:18%;">관리</th>
          </tr>
          </thead>

          <tbody>
          <tr th:each="r : ${reviews.content}">
            <td>
              <span class="badge-pill"
                    th:classappend="${r.status.name() == 'ACTIVE'} ? ' badge-ok' : ' badge-danger'"
                    th:text="${r.status}">ACTIVE</span>
            </td>

            <td>
              <div class="fw-bold" th:text="${r.complex != null ? r.complex.title : '(매물없음)'}"></div>
              <div class="text-muted" style="font-size:.85rem;"
                   th:text="${r.complex != null ? '매물ID #' + r.complex.cid : ''}"></div>
            </td>

            <td>
              <div class="fw-bold" th:text="${r.title}">리뷰제목</div>
              <div class="text-muted"
                   style="font-size:.85rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:480px;"
                   th:text="${r.content}">리뷰내용</div>
            </td>

            <td th:text="${r.user != null ? r.user.nickname : '탈퇴회원'}">작성자</td>

            <td th:text="${r.createdAt != null ? #temporals.format(r.createdAt, 'yyyy-MM-dd') : ''}">작성일</td>

            <td>
              <!-- ACTIVE면 숨김 -->
              <form th:if="${r.status.name() == 'ACTIVE'}"
                    th:action="@{/admin/reviews/{id}/hide(id=${r.reviewId})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="status" th:value="${status}">
                <input type="hidden" name="q" th:value="${q}">
                <input type="hidden" name="page" th:value="${reviews.number}">
                <button class="btn btn-sm btn-outline-secondary" type="submit">숨김</button>
              </form>

              <!-- INACTIVE면 승인 -->
              <form th:if="${r.status.name() == 'INACTIVE'}"
                    th:action="@{/admin/reviews/{id}/approve(id=${r.reviewId})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="status" th:value="${status}">
                <input type="hidden" name="q" th:value="${q}">
                <input type="hidden" name="page" th:value="${reviews.number}">
                <button class="btn btn-sm btn-outline-primary" type="submit">승인</button>
              </form>
            </td>
          </tr>

          <tr th:if="${reviews.totalElements == 0}">
            <td colspan="6" class="text-center text-muted py-4">표시할 리뷰가 없습니다.</td>
          </tr>
          </tbody>
        </table>
      </div>

      <!-- (선택) 페이징 UI는 board/list 페이징 복붙해서 status/q/page 유지 형태로 붙이면 됨 -->
      <div class="text-muted mt-3" style="font-size:.9rem;">
        * 승인(ACTIVE) / 숨김(INACTIVE) 상태를 관리합니다.
      </div>
    </div>

  </div>

  <script th:src="@{/js/admin.js}"></script>
</section>
</html>
