<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout :: html(~{::main}, '아이디 찾기')}">

<main class="page">
  <link rel="stylesheet" th:href="@{/css/sign.css}">
  <section class="card" aria-label="아이디 찾기 카드">
    <h1 class="title">아이디 찾기</h1>

    <div class="find-container">
      <p class="guide-text center-text mb-40">
        가입 시 등록한<br>휴대폰 번호를 입력해주세요.
      </p>

  <form th:action="@{/user/find-id}" method="post">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
  
  <div class="input-group">
    <input class="input center-text" 
           type="tel" 
           name="phone" 
           placeholder="숫자만 입력 (예: 01012345678)"
           maxlength="11" 
           required />
  </div>

  <button class="primary" type="submit">다음</button>
</form>
    </div>
  </section>
</main>
</html>
