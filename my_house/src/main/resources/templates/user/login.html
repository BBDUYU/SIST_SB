<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout :: html(~{::main}, '로그인')}">

<main class="page">
<link rel="stylesheet" th:href="@{/css/login.css}">
  <section class="card" aria-label="로그인 카드">
    <h1 class="title">로그인</h1>

    <!-- 로그인 실패 -->
    <p class="msg error" th:if="${param.error}">
      이메일 또는 비밀번호를 확인해주세요.
    </p>

    <!-- 회원가입 성공 등 -->
    <p class="msg success" th:if="${success}" th:text="${success}"></p>

 <form th:action="@{/login}" method="post" autocomplete="on">
  <input type="hidden"
         th:name="${_csrf.parameterName}"
         th:value="${_csrf.token}" />

  <input class="input"
         type="email"
         name="email"  
         placeholder="이메일"
         required />

  <input class="input"
         type="password"
         name="password"
         placeholder="비밀번호"
         required />

  <button class="primary" type="submit">로그인</button>
</form>

    <nav class="links">
      <a th:href="@{/user/find-id}">아이디 찾기</a>
      <span class="sep">|</span>
      <a th:href="@{/user/find-password}">비밀번호 찾기</a>
      <span class="sep">|</span>
      <a th:href="@{/user/signup}">회원가입</a>
    </nav>

    <p class="sns-title">
      SNS계정으로 간편 로그인/회원가입
    </p>

<div class="sns-row">
  <a class="sns-btn" th:href="@{/oauth2/authorization/kakao}">
    <img th:src="@{/image/auth/kakao.png}" alt="카카오">
  </a>

  <a class="sns-btn" th:href="@{/oauth2/authorization/google}">
    <img th:src="@{/image/auth/google.png}" alt="구글">
  </a>

  <a class="sns-btn" th:href="@{/oauth2/authorization/naver}">
    <img th:src="@{/image/auth/naver.jpg}" alt="네이버">
  </a>
</div>
  </section>
  <script th:src="@{/js/login.js}"></script>
</main>

</html>
