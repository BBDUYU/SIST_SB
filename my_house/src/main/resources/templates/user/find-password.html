<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout :: html(~{::main}, '비밀번호 찾기')}">

<main class="page">
  <link rel="stylesheet" th:href="@{/css/sign.css}">
  <section class="card" aria-label="비밀번호 찾기 카드">
    <h1 class="title">비밀번호 찾기</h1>

    <div class="find-container">
      <p class="guide-text center-text mb-40">
        가입하신 이메일 주소를 입력해주세요.<br>
        해당 이메일로 임시 비밀번호를 보내드립니다.
      </p>

      <form th:action="@{/user/find-password}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        
        <div class="input-group">
          <input class="input center-text" 
                 type="email" 
                 name="email" 
                 th:value="${email}"
                  
                 required />
        </div>

        <button class="primary" type="submit">다음</button>
      </form>

   
    </div>
  </section>
</main>
</html>
