<main class="page">
  <link rel="stylesheet" th:href="@{/css/signup.css}">
  <style>
    /* setup-container 스타일 공유 */
    .verify-msg { font-size: 1.1rem; margin-bottom: 40px; color: #333; }
    .code-field { border: none; border-bottom: 2px solid #ddd; width: 100%; padding: 10px 0; font-size: 1.5rem; text-align: center; letter-spacing: 10px; outline: none; }
    .code-field:focus { border-bottom-color: #1a3a83; }
  </style>

  <section class="setup-container">
    <p class="verify-msg">
      <span id="displayPhone" style="font-weight: bold;">010-XXXX-XXXX</span>로 전송된<br>
      4자리 숫자를 입력해주세요.
    </p>
    
    <input type="text" id="smsCode" class="code-field" maxlength="4" placeholder="••••">
    
    <div class="action-row">
      <button type="button" class="resend-link" id="btnResendSms">재전송 받기</button>
    </div>

    <button type="button" id="btnVerifySms" class="btn-next">다음</button>
  </section>

  <script th:inline="javascript">
    const codeInput = document.getElementById('smsCode');
    const verifyBtn = document.getElementById('btnVerifySms');
    
    // URL에서 전화번호 파라미터 가져오기 (마스킹 등 처리 가능)
    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('displayPhone').innerText = urlParams.get('phone');

    codeInput.addEventListener('input', () => {
        verifyBtn.className = codeInput.value.length === 4 ? 'btn-next active' : 'btn-next';
    });

    verifyBtn.addEventListener('click', () => {
        if(verifyBtn.classList.contains('active')) {
            // 여기에 인증번호 검증 및 DB 저장 API 호출 (fetch)
            // 성공 시 3초 토스트 메시지 후 메인으로 이동
            alert("인증이 완료되었습니다!"); 
            location.href = "/";
        }
    });
  </script>
</main>
