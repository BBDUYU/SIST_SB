<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/layout :: html(~{::section}, '게시글 상세')">

<section class="board-page py-4">
  <link rel="stylesheet" th:href="@{/css/board.css}">
  <link rel="stylesheet" th:href="@{/css/board-detail.css}">

  <div class="container board-container">
    <div class="detail-card">
      <div class="detail-top">
        <span class="board-category-chip"
              th:text="${post.subCategory.scName}">자유게시판</span>
        <div class="detail-actions">
          <a class="btn btn-outline-secondary btn-sm" th:href="@{/board}">목록</a>
          <a th:if="${me != null and me.uid == post.user.uid}"
			   th:href="@{/board/{id}/edit(id=${post.boardId})}"
			   class="btn btn-sm btn-outline-primary">수정</a>
		  <form th:if="${me != null and me.uid == post.user.uid}"
		        th:action="@{/board/{id}/delete(id=${post.boardId})}"
		        method="post" style="display:inline;">
		    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
		    <button class="btn btn-sm btn-outline-danger" type="submit"
		            onclick="return confirm('정말 삭제할까요?');">삭제</button>
		  </form>
        </div>
      </div>

      <h2 class="detail-title" th:text="${post.title}">게시글 제목</h2>

      <div class="detail-meta">
        <span>
          <i class="bi bi-person me-1"></i>
          <strong th:text="${post.user.nickname}">작성자</strong>
        </span>
        <span>
          <i class="bi bi-calendar3 me-1"></i>
          <strong th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">
            2026-01-01
          </strong>
        </span>
      </div>

      <article class="detail-content"
               th:text="${post.content}">
        게시글 내용
      </article>
    </div>
    
    <!-- 댓글 섹션 -->
	<section class="comment-card mt-4">
      <div class="comment-head">
        <h3 class="comment-title">댓글</h3>
        <span class="comment-count"
              th:text="${#lists.size(replies)}">0</span>
      </div>

      <!-- 댓글 목록 -->
      <div th:if="${#lists.isEmpty(replies)}"
           class="comment-empty">
        아직 댓글이 없어요.
      </div>

      <ul class="comment-list">
        <li th:each="reply : ${replies}" class="comment-item">
          <div class="comment-meta">
            <strong th:text="${reply.user.nickname}">작성자</strong>
            <span th:text="${#temporals.format(reply.createdAt, 'yyyy-MM-dd HH:mm')}">
              날짜
            </span>
          </div>
          <div class="comment-content"
               th:text="${reply.content}">
            댓글 내용
          </div>
          
          <form th:if="${me != null and me.uid == reply.user.uid}"
		        th:action="@{/board/{postId}/reply/{replyId}/delete(postId=${post.boardId}, replyId=${reply.replyId})}"
		        method="post" style="display:inline;">
		    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
		    <button class="btn btn-sm btn-outline-danger" type="submit">삭제</button>
		  </form>
        </li>
      </ul>

      <!-- 댓글 작성 -->
      <form th:action="@{/board/{postId}/reply(postId=${post.boardId})}"
            method="post"
            class="comment-form mt-3">

        <input class="comment-input"
               name="content"
               maxlength="200"
               placeholder="댓글을 입력하세요 (최대 200자)"
               required />

        <button class="comment-submit" type="submit">등록</button>
      </form>

    </section>
	
  </div>
</section>
</html>
