<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/layout :: html(~{::section}, '게시판')">

<section class="board-page py-4">
  <link rel="stylesheet" th:href="@{/css/board.css}">

  <div class="container board-container">
    <div class="board-hero">
      <div>
        <h1 class="board-title">커뮤니티 게시판</h1>
        <p class="board-subtitle mb-0">공지사항, 자유게시판, Q&A를 한 번에 확인해보세요.</p>
      </div>
      <a class="btn btn-primary board-write-btn" th:href="@{/board/write}">
        <i class="bi bi-pencil-square me-1"></i>글쓰기
      </a>
    </div>

    <div class="board-toolbar">
      <div class="board-tabs" role="tablist" aria-label="게시판 카테고리">
        <button class="board-tab" th:classappend="${selectedCategory == 'all'} ? ' active'"
                th:attr="data-category='all'" type="button">전체</button>
        <button class="board-tab" th:classappend="${selectedCategory == 'notice'} ? ' active'"
                th:attr="data-category='notice'" type="button">공지사항</button>
        <button class="board-tab" th:classappend="${selectedCategory == 'free'} ? ' active'"
                th:attr="data-category='free'" type="button">자유게시판</button>
        <button class="board-tab" th:classappend="${selectedCategory == 'qna'} ? ' active'"
                th:attr="data-category='qna'" type="button">회원질문</button>
      </div>

      <div class="board-search-wrap">
        <i class="bi bi-search"></i>
        <input id="boardSearch" type="search" class="form-control"
               placeholder="제목 또는 내용 검색"
               th:value="${q}">
      </div>
    </div>

    <div class="table-responsive board-table-wrap">
      <table class="table board-table align-middle mb-0">
        <thead>
        <tr>
          <th scope="col" style="width: 14%;">카테고리</th>
          <th scope="col">제목</th>
          <th scope="col" style="width: 14%;">작성자</th>
          <th scope="col" style="width: 14%;">작성일</th>
        </tr>
        </thead>
        <tbody id="boardTableBody">
        <tr th:if="${posts == null or #lists.isEmpty(posts.content)}">
          <td colspan="4" class="text-center py-5 text-muted">게시글이 없습니다.</td>
        </tr>

        <!-- 게시글 목록 -->
        <tr th:each="post : ${posts.content}" th:unless="${posts == null}">
          <td>
            <span class="board-category-chip" th:text="${post.subCategory.scName}">자유게시판</span>
          </td>
          <td>
            <a class="board-post-link"
               th:href="@{/board/{postId}(postId=${post.boardId})}"
               th:text="${post.title}">게시글 제목</a>
          </td>
          <td th:text="${post.user.nickname}">작성자</td>
          <td th:text="${post.createdAt != null ? #temporals.format(post.createdAt, 'yyyy-MM-dd') : ''}">2026-01-01</td>
        </tr>
        </tbody>
      </table>
    </div>

     <!-- 페이징: Page<Board> 기준 -->
    <nav class="board-pagination-wrap mt-3" aria-label="게시판 페이지 이동"
         th:if="${posts != null and posts.totalPages > 1}">
      <ul class="pagination justify-content-center mb-0">
        <!-- 이전 -->
        <li class="page-item" th:classappend="${posts.first} ? ' disabled'">
          <a class="page-link"
             th:href="@{/board(category=${selectedCategory}, q=${q}, page=${posts.number - 1})}">‹</a>
        </li>

        <!-- 페이지 번호 (현재 페이지 기준 앞뒤 2개) -->
        <li class="page-item"
            th:each="p : ${#numbers.sequence(T(java.lang.Math).max(0, posts.number-2), T(java.lang.Math).min(posts.totalPages-1, posts.number+2))}"
            th:classappend="${p == posts.number} ? ' active'">
          <a class="page-link"
             th:href="@{/board(category=${selectedCategory}, q=${q}, page=${p})}"
             th:text="${p + 1}">1</a>
        </li>

        <!-- 다음 -->
        <li class="page-item" th:classappend="${posts.last} ? ' disabled'">
          <a class="page-link"
             th:href="@{/board(category=${selectedCategory}, q=${q}, page=${posts.number + 1})}">›</a>
        </li>
      </ul>
    </nav>
  </div>

  <script th:src="@{/js/board.js}"></script>
</section>
</html>
