<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/layout :: html(~{::section}, 'mypage')">

<section
  th:with="
    u=${user} ?: ${ {'nickname':'', 'grade':'', 'phone':'', 'email':''} },
    s=${stats} ?: ${ {'recentView':0, 'reviewCount':0, 'inquiryCount':0} },
    rs=${reviewStats} ?: ${ {'averageScore':0.0} }
  "
>
  <link rel="stylesheet" th:href="@{/css/mypage.css}">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <div class="container">

    <div class="header">
      <h1 class="title">마이페이지</h1>
    </div>

    <!-- 탭 -->
    <div class="tab-container">
      <div class="tab-menu">
        <button class="tab-button active" data-tab="myinfo">내정보</button>
        <button class="tab-button" data-tab="recent">최근본매물</button>
        <button class="tab-button" data-tab="review">리뷰</button>
        <button class="tab-button" data-tab="inquiry">문의</button>
      </div>
      <div class="tab-indicator"></div>
    </div>

    <div class="tab-content-wrapper">

      <!-- 내정보 -->
      <div id="myinfo-tab" class="tab-content active">

        <div class="card">
          <div class="card-header">
            <h3 class="card-title">프로필 정보</h3>
            <a th:href="@{/mypage/profile}" class="btn-edit">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h9"></path>
                <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path>
              </svg>
              수정
            </a>
          </div>

          <div class="profile-info">
            <div class="profile-avatar">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </div>

            <div class="profile-text">
              <p class="profile-nickname" th:text="${u['nickname']}">닉네임</p>
              <p class="profile-grade" th:text="${u['grade']}"></p>
            </div>
          </div>

          <div class="info-list">
            <div class="info-item">
              <span class="material-symbols-outlined">call</span>
              <span th:text="${u['phone']}">010-1234-5678</span>
            </div>

            <div class="info-item">
              <span class="material-symbols-outlined">mail</span>
              <span th:text="${u['email']}">dummy@example.com</span>
            </div>
          </div>
        </div>

        <!-- 활동 통계 -->
        <div class="card">
          <h3 class="card-title">활동 통계</h3>

          <div class="stats-grid">
            <button type="button" class="stat-item stat-link" data-go-tab="recent">
              <p class="stat-number" th:text="${s['recentView']}">0</p>
              <p class="stat-label">최근 본 매물</p>
            </button>

            <button type="button" class="stat-item stat-link" data-go-tab="review">
              <p class="stat-number" th:text="${s['reviewCount']}">0</p>
              <p class="stat-label">작성한 리뷰</p>
            </button>

            <button type="button" class="stat-item stat-link" data-go-tab="inquiry">
              <p class="stat-number" th:text="${s['inquiryCount']}">0</p>
              <p class="stat-label">문의 내역</p>
            </button>
          </div>
        </div>
      </div>

      <!-- 최근본매물 -->
      <div id="recent-tab" class="tab-content">
        <div class="tab-info">
          <p class="info-text" th:text="|총 ${s['recentView']}개의 매물을 확인했어요|">
            총 0개의 매물을 확인했어요
          </p>
        </div>
        <div class="property-list"></div>
      </div>

      <!-- 리뷰 -->
      <div id="review-tab" class="tab-content">
        <div class="card">
          <h3 class="card-title">리뷰 요약</h3>

          <div class="review-summary">
            <div class="review-score">
              <p class="score-number" th:text="${rs['averageScore']}">0.0</p>

              <div class="stars" id="avgStars"></div>

              <p class="score-label">
                평균 평점
                <span class="muted"
                      th:text="|(${s['reviewCount']}개)|">(0개)</span>
              </p>
            </div>

            <div class="review-bars">
              <div class="bar-item">
                <span class="bar-label">5점</span>
                <div class="bar-background"><div class="bar-fill" id="bar5"></div></div>
                <span class="bar-percent" id="percent5">0%</span>
              </div>
              <div class="bar-item">
                <span class="bar-label">4점</span>
                <div class="bar-background"><div class="bar-fill" id="bar4"></div></div>
                <span class="bar-percent" id="percent4">0%</span>
              </div>
              <div class="bar-item">
                <span class="bar-label">3점</span>
                <div class="bar-background"><div class="bar-fill" id="bar3"></div></div>
                <span class="bar-percent" id="percent3">0%</span>
              </div>
              <div class="bar-item">
                <span class="bar-label">2점</span>
                <div class="bar-background"><div class="bar-fill" id="bar2"></div></div>
                <span class="bar-percent" id="percent2">0%</span>
              </div>
              <div class="bar-item">
                <span class="bar-label">1점</span>
                <div class="bar-background"><div class="bar-fill" id="bar1"></div></div>
                <span class="bar-percent" id="percent1">0%</span>
              </div>
            </div>
          </div>
        </div>

        <div class="review-list"></div>
      </div>

      <!-- 문의 -->
      <div id="inquiry-tab" class="tab-content">
        <div class="highlight-box">
          <p class="highlight-title">✉️ 빠른 답변을 원하시나요?</p>
          <p class="highlight-text">
            긴급한 문의사항은 고객센터(salmahae@naver.com)로 연락 주시면 더 빠르게 도와드릴 수 있습니다.
          </p>
        </div>

        <div class="inquiry-list"></div>

        <a th:href="@{/mypage/inquiry}" class="btn-primary">새 문의 작성하기</a>
      </div>

    </div>
  </div>

  <script th:src="@{/js/mypage.js}"></script>
</section>
</html>
